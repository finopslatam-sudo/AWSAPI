<!-- Modal de Login -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">🔑 Iniciar Sesión</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="loginEmail" required>
                    </div>
                    <div class="mb-3" id="loginPasswordSection">
                        <label for="loginPassword" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <div id="loginMfaSection" style="display: none;">
                        <p class="small text-muted mb-2" id="loginMfaInstructions"></p>
                        <div class="mb-3">
                            <label for="loginMfaCode" class="form-label">Código MFA</label>
                            <input type="text" class="form-control" id="loginMfaCode" autocomplete="one-time-code">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="loginUseRecoveryCode">
                            <label class="form-check-label" for="loginUseRecoveryCode">
                                Usar recovery code
                            </label>
                        </div>
                        <div class="alert alert-secondary" id="loginMfaEnrollment" style="display: none;">
                            <div class="mb-2"><strong>Secreto MFA:</strong> <span id="loginMfaSecret"></span></div>
                            <a id="loginMfaSetupLink" href="#" target="_blank" rel="noopener">Abrir configuración en tu app</a>
                        </div>
                    </div>
                    <div class="alert alert-danger" id="loginError" style="display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="loginSubmitButton" onclick="login()">Iniciar Sesión</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Registro -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">👤 Crear Cuenta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="registerCompany" class="form-label">Nombre de la Empresa</label>
                        <input type="text" class="form-control" id="registerCompany" required>
                    </div>
                    <div class="mb-3">
                        <label for="registerEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="registerEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="registerContact" class="form-label">Nombre de Contacto</label>
                        <input type="text" class="form-control" id="registerContact">
                    </div>
                    <div class="mb-3">
                        <label for="registerPassword" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="registerPassword" required>
                    </div>
                    <div class="alert alert-danger" id="registerError" style="display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="register()">Registrarse</button>
            </div>
        </div>
    </div>
</div>
